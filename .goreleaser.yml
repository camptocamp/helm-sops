project_name: "helm-sops"

before:
  hooks:
    - "go mod vendor"

builds:
  - binary: "helm-sops"
    goos:
      - "linux"
      - "darwin"
    flags: "-trimpath"
    ldflags: "-s -w"
    mod_timestamp: "{{ $.CommitTimestamp }}"
    env:
      - "CGO_ENABLED=0"

dockers_v2:
  - images:
      - "ghcr.io/camptocamp/helm-sops"
    tags:
      - "{{ .Version }}"
    extra_files:
      - "_helm"

release:
  prerelease: "false"

changelog:
  filters:
    exclude:
      - "^(refactor|style|test|docs|ci)(\\([^)]+\\))?(!)?:"
